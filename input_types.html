<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>HTML Input Type Demo</h1>
    <form>
        <label>Enter Your Name:</label>
        <input type="text" placeholder="enter name"><br><br>
        <label>Enter Your Email:</label>
        <input type="email" placeholder="enter email"><br><br>
        <label>Enter password:</label>
        <input type="password" placeholder="enter password"><br><br>
        <label>Enter phone Number:</label>
        <input type="number" placeholder="enter number"><br><br>

        <label>Enter DOB:</label>
        <input type="date"/>
        <label>Enter Month:</label>
        <input type="month"/>
        <label>Enter Week:</label>
        <input type="week"/>
        <label>Enter Time:</label>
        <input type="time"/>
        <label>Date & Time</label>
        <input type="datetime-local"/><br><br>

        <label>Choose Cities</label><br>
        <input type="checkbox" checked>Pune
        <input type="checkbox" checked>Mumbai
        <input type="checkbox">Nashik
        <input type="checkbox">Satare<br><br>

        <label>Select Gender</label><br>
        <input type="radio" name="gender">Male
        <input type="radio" name="gender">Female
        <input type="radio" name="gender">Other<br><br>

        <label>Select Color:</label>
        <input type="color"><br><br>

        <label>Select Range:</label>
        <input type="range"><br><br>

        <label>Upload your photo:</label>
        <input type="file"><br><br>

        <label>Upload your photo:</label>
        <input type="file" multiple><br><br>

        <label>Select Fev Dish:</label>
        <select>
            <option>Choose..</option>
            <option>Puranpoli</option>
            <option>Panipuri</option>
            <option>Amras Puri</option>
            <option>Noodels</option>
        </select><br><br>

        <label>Enter Address</label>
        <textarea rows="5" cols="20"></textarea><br>

        <input type="submit" value="submit"><br><br>
        <input type="button" value="submit"><br><br>
        <input type="reset" value="Reset"
    </form>
</body>
</html>
